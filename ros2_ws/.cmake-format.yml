# ROS2 + ament_lint_cmake 向け

line_width: 100
tab_size: 2

# 継続行は 2 スペース
use_tabchars: false

# 縦揃え禁止
enable_markup: false
dangle_parens: true
dangle_align: child

# 無理な折り返しを避ける
max_subgroups_hwrap: 2
max_pargs_hwrap: 4
max_rows_cmdline: 2

# 短いものは1行維持
min_prefix_chars: 4
max_prefix_chars: 10

# 引数ごとに折る対象
always_wrap:
  - target_include_directories
  - target_compile_features
  - target_link_libraries
  - ament_target_dependencies

# 明示的に1行維持したいもの
layout_passes:
  find_package: [single]
  install: [single]
  add_executable: [single]
  add_library: [single]