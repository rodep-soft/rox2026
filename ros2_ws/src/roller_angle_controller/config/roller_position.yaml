roller_can_command_node:
  ros__parameters:
    pwm_topic: "/roller/rpm_value"
    pwm_topic_type: "std_msgs/msg/Int16"
    can_tx_topic: "/roller/can_frame"
    can_tx_topic_type: "can_msgs/msg/Frame"
    can_id: 0x201
    min_pwm: -255
    max_pwm: 255

belt_can_command_node:
  ros__parameters:
    pwm_topic: "/belt/rpm_value"
    pwm_topic_type: "std_msgs/msg/Int16"
    can_tx_topic: "/belt/can_frame"
    can_tx_topic_type: "can_msgs/msg/Frame"
    can_id: 0x202
    min_pwm: 0
    max_pwm: 255

motor_can_packer_node:
  ros__parameters:
    can_tx_topic: "/CAN/can0/transmit"
    can_tx_topic_type: "can_msgs/msg/Frame"
    can_id: 0x201
    is_extended: false
    roller_enabled: true
    roller_topic: "/roller/can_frame"
    roller_topic_type: "can_msgs/msg/Frame"
    belt_enabled: true
    belt_topic: "/belt/can_frame"
    belt_topic_type: "can_msgs/msg/Frame"

ros2socketcan:
  ros__parameters:
    CAN_INTERFACE: "can0"

joy_node:
  ros__parameters:
    dev: "/dev/input/js0"
