mabuchi_can_command_node:
  ros__parameters:
    pwm_topic: "/mabuchi555/pwm_value"  # 入力するPWM topic
    can_tx_topic: "/can_tx"             # 変換したCAN frameをpublishするtopic
    min_pwm: -255                       # 送信するPWMの下限値
    max_pwm: 255                        # 送信するPWMの上限値

mad_motor_can_command_node:
  ros__parameters:
    pwm_topic: "/mad_motor/rpm"  # 入力するPWM topic
    can_tx_topic: "/can_tx"            # 変換したCAN frameをpublishするtopic
    min_pwm: 0                     # 送信するPWMの下限値
    max_pwm: 255                       # 送信するPWMの上限値

motor_can_packer_node:
  ros__parameters:
    can_tx_topic: "/CAN/can0/transmit" # ros2socketcan_bridgeへ渡すCAN送信topic
    can_id: 0x201                      # STMが受け取るCAN ID
    is_extended: false                 # falseなら標準ID、trueなら拡張ID
    roller_enabled: true               # roller側の入力を使うか(data[2..3])
    roller_topic: "/roller/can_frame"  # roller側のCAN frame入力topic
    belt_enabled: true                 # belt側の入力を使うか(data[0..1])
    belt_topic: "/belt/can_frame"      # belt側のCAN frame入力topic
