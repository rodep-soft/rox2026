spring_joy_sub:
  ros__parameters:
    subscribed_joy: /joy_second
    shoot_key: #発射キー
      type: "button"
      index: 10
    lock_key: #安全装置キー
      type: "axis"
      index: 4

spring_edulite_controller:
  ros__parameters:
    publish_edulite: /spring_edulite_speed
    fire_speed_: -40.0     #発射時の回転速度[rad/s]
    loading_speed: -4.0  #装填時の回転速度[rad/s]
    limit_sw_index: 1   #limit_swのindex
    fire_duration: 0.7  #発射時間の長さ[s]

edulite05_single_velocity_node:
  ros__parameters:
    # Motor ID stored in the lower 8 bits of the CAN ID (1 to 255).
    motor_id: 10

    # Maximum velocity command received on motor_vel [rad/s].
    max_velocity_rad_s: 40.0

    # Values written to EDULITE05 during initialization.
    current_limit_a: 11.0
    acceleration_rad_s2: 100.0

    # ROS topics used by this node.
    can_tx_topic: "/to_can_bus"
    motor_vel_topic: "spring_edulite_speed"
