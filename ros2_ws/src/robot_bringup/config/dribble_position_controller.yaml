dribble_position_controller:
  ros__parameters:
    # hardware_driverへ送る目標位置topic。std_msgs/msg/Float32、単位はrad。
    dribble_position_command_topic: /dribble/position_command
    # hardware_driverから受ける実位置topic。std_msgs/msg/Float32、単位はrad。
    dribble_position_feedback_topic: /dribble/position_feedback
    # 位置移動を受け付けるAction名。robot_controller/action/DribblePosition。
    dribble_position_action: /dribble/position
    dribble_position_rad: 0.15
    intake_position_rad: -1.1
    fire_position_rad: 1.4
    position_tolerance_rad: 0.02
    # cancelまたは中断時にDRIBBLE位置へ戻るまでの待機時間[s]。
    return_timeout_sec: 3.0
    qos_depth: 1
