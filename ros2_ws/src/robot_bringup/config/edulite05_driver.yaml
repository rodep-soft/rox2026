# edulite05_driver configuration for all motors

edulite05_fl_driver:
  ros__parameters:
    sub_cmd_topic_name: "/mecanum/fl/vel_command" # std_msgs/msg/Float32 (rad/s)
    pub_can_topic_name: "socketcan_bridge/tx"
    sub_can_topic_name: "socketcan_bridge/rx"
    pub_fb_topic_name: "/mecanum/fl/feedback"     # std_msgs/msg/Float32
    motor_id: 0x01
    runmode: "Velocity"                           # "Velocity" or "Position"
    is_requested_fb_pub: false                    # Publish feedback if true

