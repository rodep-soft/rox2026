joy_node:
  ros__parameters:
    dev: "/dev/input/js0"

mad_motor_node:
  ros__parameters:
    enable_button: 7
    stop_button: 4
    circle_button: 1
    cross_button: 0
    triangle_button: 2
    square_button: 3

    stop_pwm: 0
    circle_pwm: 30
    cross_pwm: 85
    triangle_pwm: 170
    square_pwm: 255

mad_motor_can_command_node:
  ros__parameters:
    # mad_motor_nodeがpublishするPWMを、STM向けCAN frameへ変換する。
    pwm_topic: "/mad_motor/rpm"
    can_tx_topic: "/CAN/can0/transmit"
    can_id: 0x202
    is_extended: false
    min_pwm: 0
    max_pwm: 255
    send_period_ms: 20
    timeout_ms: 500

ros2socketcan:
  ros__parameters:
    CAN_INTERFACE: "can0"
