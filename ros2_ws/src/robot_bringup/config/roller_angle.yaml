roller_position_controller:
  ros__parameters:
    # RobStride loc_ref is radian.
    storage_angle: 1.5 
    intake_angle: 0.2  
    shoot_angle: -1.05

    enable_button: 9  # buttons[4]を押している間だけプリセット操作を有効化
    storage_button: 11
    intake_button: 12
    shoot_button: 13

robstride_position_node:
  ros__parameters:
    can_tx_topic: "/CAN/can0/transmit"   # ros2socketcan_bridgeへ渡すCAN送信topic
    motor_can_id: 0x38                   # 対象モーターのCAN ID (パラメータ0x200aのデフォルト値は1)
    host_can_id: 0xFD                    # このノード(ホスト)側のCAN ID

    command_topic: "/robstride/position_cmd"  # 目標角度[rad]を受け取るtopic (std_msgs/Float32)

    send_period_ms: 20                   # loc_refを送信する周期
    startup_inter_frame_ms: 10           # PP初期化フレーム間の待機時間[ms]

    position_min_rad: -1.6     # 目標角度[rad]の下限 (-4π。loc_ref自体にマニュアル上の制限値記載はないが、
                                          # 位置フィードバックが-4π~4πで周期ループする仕様に合わせたソフト側の制限)
    position_max_rad: 1.7       # 目標角度[rad]の上限 (4π。理由はposition_min_radのコメント参照)

    home_position_rad: 0.2              # 起動時の初期目標、および終了時に復帰する位置[rad]

    enable_on_startup: true              # 起動時にモーター有効化コマンド(Communication Type 3)を送るか

    position_current_limit: -1.0         # PP/速度モード電流上限[A] (0以上で0x7018へ書き込み、負値=未指定/変更しない)
    position_velocity_rad_s: 10.0        # PP位置モード最大速度[rad/s] (0x7024 vel_max。動作中変更は非対応)
    position_acceleration_rad_s2: 10.0   # PP位置モード加速度[rad/s^2] (0x7025 acc_set。動作中変更は非対応)
    shutdown_return_wait_ms: 2000        # home_position_radへ戻す待機時間[ms]。±4πから2rad/sで戻る時間(約6.3秒)に余裕を加えた値
