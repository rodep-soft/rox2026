joy_node:
  ros__parameters:
    dev: "/dev/input/js0"

belt_controller_node:
  ros__parameters:
    enable_button: 7
    stop_button: 4
    circle_button: 1
    cross_button: 0
    triangle_button: 2
    square_button: 3
    stop_pwm: 0
    circle_pwm: 30
    cross_pwm: 85
    triangle_pwm: 170
    square_pwm: 255

roller_belt_can_packer_node:
  ros__parameters:
    can_transmit_topic: "/CAN/can0/transmit"
    stm_can_id: 0x201
    is_extended: false
    roller_rpm_topic: "/roller/rpm"
    belt_rpm_topic: "/belt/rpm_value"
    min_rpm: 0
    max_rpm: 300
    publish_period_ms: 20
    timeout_ms: 500

ros2socketcan:
  ros__parameters:
    CAN_INTERFACE: "can0"
