name: ros2 build and test
# This workflow builds and tests ROS 2 packages using Docker Compose.
# It is triggered on push and pull request events. The workflow ensures that only one instance runs for a given branch or pull request, canceling any in-progress runs if a new one is triggered.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
  
permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker compose up -d --build

      - name: Install CI tools
        run: |
          docker compose exec -T ros2_rox2026 \
          bash -ec "
          apt update && \
          apt install -y uncrustify && \
          pip3 install black"

      - name: Format C++
        run: |
          docker compose exec -T ros2_rox2026 \
          bash -ec "
            find src \
            \( \
              -name '*.cpp' \
              -o -name '*.hpp' \
              -o -name '*.h' \
              -o -name '*.ipp' \
            \) \
            -exec uncrustify \
              -c \
              /opt/ros/humble/share/ament_uncrustify/configuration/ament_code_style.cfg \
              --replace \
              --no-backup \
              {} +"
                
      - name: Format Python
        run: |
          docker compose exec -T ros2_rox2026 \
          bash -ec "
            black src"

      - name: Run test & test results
        run: |
          docker compose exec -T ros2_rox2026 \
          bash -ec " 
          source /opt/ros/humble/setup.bash && \
          cd /root/ros2_ws && \
          source install/setup.bash && \
          colcon test && \
          colcon test-result --verbose"

      - name: Commit formatted code
        run: |
          git config user.name "$(git --no-pager log --format=format:'%an' -n 1)"
          git config user.email "$(git --no-pager log --format=format:'%ae' -n 1)"

          git add .

          if ! git diff --cached --quiet
          then
            git commit \
            -m \
            'style: auto format'

            git push
          fi

      - name: Stop container
        if: always()
        run: |
          docker compose down