robstride_position_node:
  ros__parameters:
    can_tx_topic: "/CAN/can0/transmit"   # ros2socketcan_bridgeへ渡すCAN送信topic
    is_extended: true                    # RobStrideは29bit拡張IDを使うプロトコルなので基本true

    motor_can_id: 1                      # 対象モーターのCAN ID (パラメータ0x200aのデフォルト値は1)
    host_can_id: 0xFD                    # このノード(ホスト)側のCAN ID

    control_mode: "position"             # 起動時に一度だけrun_mode=1(位置モード/PP)を書き込み、以後固定
    command_topic: "/robstride/position_cmd"  # 目標角度[rad]を受け取るtopic (std_msgs/Float32)

    send_period_ms: 20                   # loc_refを送信する周期
    timeout_ms: 500                      # 未使用(position modeではtimeoutで停止させない。最後の指令角度を送り続ける)

    position_min_rad: -12.566370614      # 目標角度[rad]の下限 (-4π。loc_ref自体にマニュアル上の制限値記載はないが、
                                          # 位置フィードバックが-4π~4πで周期ループする仕様に合わせたソフト側の制限)
    position_max_rad: 12.566370614       # 目標角度[rad]の上限 (4π。理由はposition_min_radのコメント参照)

    enable_on_startup: true              # 起動時にモーター有効化コマンド(Communication Type 3)を送るか

    set_zero_on_startup: false           # position mode起動時に現在位置を機械ゼロに設定するか
    position_speed: -1.0                 # PP位置モード速度 (0以上で書き込み、負値=未指定/変更しない)
    position_acceleration: -1.0          # PP位置モード加速度 (0以上で書き込み、負値=未指定/変更しない)

    limit_torque: -1.0                   # トルク制限[N・m] (マニュアル上の範囲: 0~5.5, 負値=未指定/変更しない)
    limit_cur: -1.0                      # 電流制限[A] (マニュアル上の範囲: 0~11, 負値=未指定/変更しない)
    limit_spd: -1.0                      # CSP位置モード速度制限[rad/s] (マニュアル上の範囲: 0~50, 負値=未指定/変更しない)

robstride_velocity_node:
  ros__parameters:
    can_tx_topic: "/CAN/can0/transmit"   # ros2socketcan_bridgeへ渡すCAN送信topic
    is_extended: true                    # RobStrideは29bit拡張IDを使うプロトコルなので基本true

    motor_can_id: 2                      # position用ノードと同じCANバス上で別モーターを想定したデフォルト値
    host_can_id: 0xFD                    # このノード(ホスト)側のCAN ID

    control_mode: "velocity"             # 起動時に一度だけrun_mode=2(速度モード)を書き込み、以後固定
    command_topic: "/robstride/velocity_cmd"  # 目標角速度[rad/s]を受け取るtopic (std_msgs/Float32)

    send_period_ms: 20                   # spd_refを送信する周期
    timeout_ms: 500                      # 指令が途切れたと判断してspd_ref=0(安全停止)にするまでの時間

    velocity_min_rad_s: -50.0            # 目標角速度[rad/s]の下限 (マニュアル上のspd_ref範囲: -50~50)
    velocity_max_rad_s: 50.0             # 目標角速度[rad/s]の上限 (マニュアル上のspd_ref範囲: -50~50)

    enable_on_startup: true              # 起動時にモーター有効化コマンド(Communication Type 3)を送るか

    limit_torque: -1.0                   # トルク制限[N・m] (マニュアル上の範囲: 0~5.5, 負値=未指定/変更しない)
    limit_cur: -1.0                      # 電流制限[A] (マニュアル上の範囲: 0~11, 負値=未指定/変更しない)
    limit_spd: -1.0                      # CSP位置モード速度制限[rad/s] (マニュアル上の範囲: 0~50, 負値=未指定/変更しない)
